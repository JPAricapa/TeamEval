name: teameval_frontend
description: Plataforma de Evaluación y Analítica de Trabajo en Equipo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado y gestión de datos
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # HTTP y API
  http: ^1.1.2
  dio: ^5.4.0

  # Almacenamiento local
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI Components
  material_design_icons_flutter: ^7.0.7296
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3

  # Gráficas y analytics
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41

  # Navegación
  go_router: ^13.0.0

  # Formularios
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^10.0.1

  # Fechas
  intl: ^0.19.0

  # Exportación
  excel: ^4.0.2
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1

  # Otros
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  table_calendar: ^3.0.9
  lottie: ^3.1.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
